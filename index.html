<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DaVinci - AWS 아키텍처 전문 다이어그램 에디터. draw.io 기반 클라우드 아키텍처 설계 도구." />
  <title>DaVinci — AWS Architecture Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>

<body>
  <!-- 상단 툴바 -->
  <header id="toolbar" class="toolbar">
    <div class="toolbar__left">
      <div class="toolbar__brand">
        <span class="toolbar__logo">&#9670;</span>
        <span class="toolbar__title">DaVinci</span>
        <span class="toolbar__subtitle">AWS Architect</span>
      </div>
    </div>
    <div class="toolbar__center">
      <button id="btn-align" class="toolbar__btn toolbar__btn--action" title="아키텍처 자동 정렬">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="21" y1="10" x2="3" y2="10" />
          <line x1="21" y1="6" x2="3" y2="6" />
          <line x1="21" y1="14" x2="3" y2="14" />
          <line x1="21" y1="18" x2="3" y2="18" />
        </svg>
        <span>정렬</span>
      </button>
      <button id="btn-analyze" class="toolbar__btn toolbar__btn--action" title="아키텍처 분석">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <span>분석</span>
      </button>
      <button id="btn-optimize" class="toolbar__btn toolbar__btn--action" title="최적화 팁 보기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span>최적화</span>
      </button>
    </div>
    <div class="toolbar__right">

      <!-- 우측 사이드바 토글 -->
      <button id="sidebar-toggle" class="toolbar__btn toolbar__btn--icon" title="AI Assistant"
        aria-label="AI Assistant 패널 토글" aria-expanded="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <line x1="15" y1="3" x2="15" y2="21" />
        </svg>
      </button>
    </div>
  </header>

  <!-- 메인 에디터 영역 -->
  <main id="editor-area" class="editor">
    <iframe id="drawio-frame" class="editor__iframe" title="draw.io 에디터"></iframe>
    <div id="editor-loading" class="editor__loading">
      <div class="editor__spinner"></div>
      <p>draw.io 에디터를 불러오는 중...</p>
    </div>
  </main>

  <!-- 우측 AI Assistant 사이드바 -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar__header">
      <h2 class="sidebar__title">AI Assistant</h2>
      <span class="sidebar__badge">Preview</span>
      <div class="sidebar__header-actions">
        <button id="btn-undo" class="sidebar__header-btn" title="되돌리기" aria-label="다이어그램 되돌리기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1,4 1,10 7,10" />
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
          </svg>
        </button>
        <button id="btn-new-chat" class="sidebar__header-btn" title="새 대화" aria-label="새 대화 시작">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
    </div>
    <div class="sidebar__content" id="chat-messages">
      <div class="sidebar__welcome">
        <div class="sidebar__welcome-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-aws-orange)"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
            <path d="M8 7h.01M12 7h.01M16 7h.01" />
          </svg>
        </div>
        <h3>AWS 아키텍처 AI</h3>
        <p>자연어로 아키텍처를 생성하거나 수정할 수 있습니다.</p>
        <div class="sidebar__examples">
          <button class="sidebar__example-btn" data-prompt="3-tier 웹 애플리케이션 아키텍처를 그려줘">3-tier 웹 앱 아키텍처</button>
          <button class="sidebar__example-btn" data-prompt="서버리스 이벤트 드리븐 아키텍처를 그려줘">서버리스 아키텍처</button>
          <button class="sidebar__example-btn" data-prompt="EKS 기반 마이크로서비스 아키텍처를 그려줘">EKS 마이크로서비스</button>
        </div>
      </div>
    </div>
    <div class="sidebar__input-area">
      <div class="sidebar__input-wrapper">
        <textarea id="chat-input" class="sidebar__input" placeholder="아키텍처를 설명해주세요..." rows="1"></textarea>
        <button id="chat-send" class="sidebar__send-btn" title="전송" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22,2 15,22 11,13 2,9" />
          </svg>
        </button>
      </div>
      <p class="sidebar__disclaimer">AI 기능은 현재 개발 중입니다</p>
    </div>
  </aside>

  <!-- 모달 영역 -->
  <div id="modal-root"></div>

  <!-- 토스트 영역 -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
